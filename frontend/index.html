<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered multi-agent travel planner with real-time streaming, budget estimation, and smart recommendations." />
    <title>TravelAI — Voyage AI Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Shader Background -->
    <div style="position: fixed; inset: 0; z-index: -1; overflow: hidden;">
      <div style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.6;">
        <canvas id="shader-canvas" style="display:block;width:100%;height:100%"></canvas>
        <script>
        (function() {
          const canvas = document.getElementById('shader-canvas');
          function syncSize() {
            const w = canvas.clientWidth  || window.innerWidth;
            const h = canvas.clientHeight || window.innerHeight;
            if (canvas.width !== w || canvas.height !== h) {
              canvas.width  = w;
              canvas.height = h;
            }
          }
          window.addEventListener('resize', syncSize);
          syncSize();

          const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
          if (!gl) return;
          const vs = `attribute vec2 a_position;
        varying vec2 v_texCoord;
        void main() {
          v_texCoord = a_position * 0.5 + 0.5;
          gl_Position = vec4(a_position, 0.0, 1.0);
        }`;
          const fs = `precision highp float;
        varying vec2 v_texCoord;
        uniform float u_time;
        uniform vec2 u_resolution;

        vec3 sunset_coral = vec3(1.0, 0.49, 0.37);
        vec3 sunset_amber = vec3(1.0, 0.75, 0.0);
        vec3 deep_navy = vec3(0.04, 0.06, 0.10);

        float noise(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = v_texCoord;
            
            // Aurora waves
            float wave1 = sin(uv.x * 3.0 + u_time * 0.5) * 0.5 + 0.5;
            float wave2 = sin(uv.y * 2.0 - u_time * 0.3 + wave1) * 0.5 + 0.5;
            
            float mix_val = smoothstep(0.3, 0.7, (uv.y + wave1 * 0.2 + wave2 * 0.1));
            
            vec3 color = mix(deep_navy, mix(sunset_coral, sunset_amber, uv.x), mix_val * 0.3);
            
            // Ambient grain
            float grain = (noise(uv + u_time * 0.01) - 0.5) * 0.05;
            color += grain;
            
            gl_FragColor = vec4(color, 1.0);
        }`;
          function cs(type, src) {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            return s;
          }
          const prog = gl.createProgram();
          gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
          gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
          gl.linkProgram(prog);
          gl.useProgram(prog);
          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
          const pos = gl.getAttribLocation(prog, 'a_position');
          gl.enableVertexAttribArray(pos);
          gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
          const uTime = gl.getUniformLocation(prog, 'u_time');
          
          function render(t) {
            gl.viewport(0, 0, canvas.width, canvas.height);
            if (uTime) gl.uniform1f(uTime, t * 0.001);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
          }
          render(0);
        })();
        </script>
      </div>
      <div style="position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #0B0F1A);"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
